 live training products. MSc in Physics, giving me unusually strong foundations in the 3D math that sits underneath most real-time graphics work. I've shipped production systems on Oculus Quest, Pico, HoloLens, and mobile, and I know what it takes to keep complex real-time experiences running reliably at scale.</p><p>Currently open to roles in games, XR, and simulation. Not afraid of quaternions.</p></div><h2 class="ns-section-title">Selected Projects</h2><div class="ns-projects"><div class="ns-project"><p class="ns-project-title">Asset Bundle Management System</p><p class="ns-project-meta">Transfr Inc. &mdash; 2023&ndash;2026 &mdash; Unity, C#, Addressables, Async</p><p class="ns-project-desc">Built and owned the client-side system responsible for delivering simulation content to VR devices. Served as the architectural decision-maker for how engineers across teams used and extended it. Demonstrated a path to 90% reduction in content patch sizes for customers.</p></div><div class="ns-project"><p class="ns-project-title">VR Training Platform SDK</p><p class="ns-project-meta">Transfr Inc. &mdash; 2023&ndash;2026 &mdash; Unity, C#, Oculus Quest, Pico, REST API</p><p class="ns-project-desc">Architected reusable SDK components and key infrastructure for a live VR training product used by thousands of students across the US, working across the full stack with product managers, XR designers, and backend engineers.</p></div><div class="ns-project"><p class="ns-project-title">Synthetic Training Data for Computer Vision</p><p class="ns-project-meta">Unity Technologies &mdash; 2022&ndash;2023 &mdash; Unity Perception, C#, HLSL, ML pipelines</p><p class="ns-project-desc">Generated synthetic training datasets of 20,000&ndash;50,000 labeled images per scene for computer vision models spanning object detection, pose estimation, and segmentation. Wrote compute shaders for real-time robotics sensor simulation and visualization.</p></div><div class="ns-project"><p class="ns-project-title">YVR Digital Twin and Fortune 500 Client Delivery</p><p class="ns-project-meta">Unity Technologies &mdash; 2020&ndash;2023 &mdash; Unity, AR/VR, industrial systems</p><p class="ns-project-desc">Shipped 4+ digital twins to Fortune 500 clients within tight deadlines, including the Vancouver International Airport digital twin. Contributed across UI, rendering, lighting, animation, and performance profiling.</p></div><div class="ns-project"><p class="ns-project-title">Thunder</p><p class="ns-project-meta">Mammoth XR &mdash; 2019 &mdash; Unity, C#, Oculus Go</p><p class="ns-project-desc">A Blackfoot language learning VR experience invited to the Vancouver and Nashville International Film Festivals in 2019. Also contributed sound design.</p></div><div class="ns-project"><p class="ns-project-title">AR Assistant for Retail (HoloLens)</p><p class="ns-project-meta">Finger Food / Unity &mdash; 2019&ndash;2021 &mdash; Unity, C#, HoloLens, MRTK</p><p class="ns-project-desc">Built world-aware AR UI on the HoloLens using Microsoft's Mixed Reality Toolkit, applying 3D math and linear algebra to implement designer visions for spatial UI movement and transitions.</p></div></div><h2 class="ns-section-title">Get in Touch</h2><div class="ns-contact"><p>Email: <a href="mailto:rose@lumenwright.com">rose@lumenwright.com</a><br>LinkedIn: <a href="https://linkedin.com/in/roseadastra" target="_blank" rel="noopener">linkedin.com/in/roseadastra</a></p></div><p class="ns-notice">This is a static fallback. Enable JavaScript to view the full site.</p></div></noscript></body></html>
